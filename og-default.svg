<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="630" viewBox="0 0 1200 630">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#111827" />
      <stop offset="100%" stop-color="#0d1320" />
    </linearGradient>
  </defs>

  <!-- Background -->
  <rect width="1200" height="630" fill="url(#bg)" />

  <!-- Subtle accent line -->
  <rect x="80" y="280" width="60" height="4" rx="2" fill="#b76a3c" />

  <!-- N. brand mark (scaled from favicon) -->
  <g transform="translate(80, 120) scale(2.2)">
    <rect width="64" height="64" rx="16" fill="none" />
    <path d="M18 46V18M18 18L40 46M40 46V18" fill="none" stroke="#ede5d8" stroke-linecap="round" stroke-linejoin="round" stroke-width="7" />
    <circle cx="49" cy="49" r="5" fill="#b76a3c" />
  </g>

  <!-- Name -->
  <text x="80" y="340" fill="#ede5d8" font-family="'Iowan Old Style', Palatino, 'Palatino Linotype', Georgia, serif" font-size="52" font-weight="600">Nitish Prasad</text>

  <!-- Tagline -->
  <text x="80" y="390" fill="#b3ab9f" font-family="'Avenir Next', -apple-system, 'Segoe UI', Roboto, sans-serif" font-size="26">Product Leader for 0&#x2192;1 and Scaled Systems</text>

  <!-- Descriptor pills -->
  <text x="80" y="450" fill="#9fd6c2" font-family="'Avenir Next', -apple-system, 'Segoe UI', Roboto, sans-serif" font-size="20" opacity="0.85">Amazon  &#xB7;  AI Platforms  &#xB7;  Builder</text>

  <!-- Domain -->
  <text x="80" y="560" fill="#b3ab9f" font-family="'Avenir Next', -apple-system, 'Segoe UI', Roboto, sans-serif" font-size="18" opacity="0.5">nitishprasad.com</text>
</svg>

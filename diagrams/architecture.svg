<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 820" font-family="'Inter', 'Segoe UI', sans-serif">
  <defs>
    <linearGradient id="greenGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#4ade80" stop-opacity="0.15"/>
      <stop offset="100%" stop-color="#22c55e" stop-opacity="0.05"/>
    </linearGradient>
    <linearGradient id="orangeGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#f97316" stop-opacity="0.15"/>
      <stop offset="100%" stop-color="#f97316" stop-opacity="0.05"/>
    </linearGradient>
    <linearGradient id="blueGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#60a5fa" stop-opacity="0.15"/>
      <stop offset="100%" stop-color="#60a5fa" stop-opacity="0.05"/>
    </linearGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="2" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>

  <!-- Background -->
  <rect width="1200" height="820" fill="#0a0a0f" rx="16"/>
  <rect x="0" y="0" width="1200" height="820" fill="url(#greenGrad)" rx="16" opacity="0.3"/>

  <!-- Title -->
  <text x="600" y="42" text-anchor="middle" fill="#f0f0f5" font-size="20" font-weight="800" letter-spacing="0.5">SproutRoute — High-Level Architecture</text>
  <line x1="440" y1="52" x2="760" y2="52" stroke="#4ade80" stroke-width="2" opacity="0.4"/>

  <!-- ═══ CLIENTS SECTION ═══ -->
  <rect x="30" y="70" width="1140" height="170" rx="12" fill="#111118" stroke="#2a2a38" stroke-width="1"/>
  <rect x="30" y="70" width="1140" height="4" rx="2" fill="#4ade80" opacity="0.6"/>
  <text x="56" y="97" fill="#4ade80" font-size="11" font-weight="700" letter-spacing="1.5">CLIENTS</text>

  <!-- Web -->
  <rect x="60" y="112" width="330" height="110" rx="10" fill="#1a1a24" stroke="#2a2a38" stroke-width="1"/>
  <circle cx="84" cy="135" r="12" fill="#4ade80" opacity="0.15" stroke="#4ade80" stroke-width="1"/>
  <text x="84" y="140" text-anchor="middle" fill="#4ade80" font-size="14">🌐</text>
  <text x="102" y="140" fill="#f0f0f5" font-size="14" font-weight="700">Web App</text>
  <text x="72" y="162" fill="#8888aa" font-size="11">React 18 + Vite + Tailwind CSS</text>
  <text x="72" y="178" fill="#8888aa" font-size="11">Served as static files from Railway</text>
  <text x="72" y="198" fill="#60a5fa" font-size="10" font-weight="600">sproutroute-production.up.railway.app</text>

  <!-- iOS -->
  <rect x="420" y="112" width="330" height="110" rx="10" fill="#1a1a24" stroke="#2a2a38" stroke-width="1"/>
  <circle cx="444" cy="135" r="12" fill="#f97316" opacity="0.15" stroke="#f97316" stroke-width="1"/>
  <text x="444" y="140" text-anchor="middle" fill="#f97316" font-size="14">📱</text>
  <text x="462" y="140" fill="#f0f0f5" font-size="14" font-weight="700">iOS App</text>
  <text x="432" y="162" fill="#8888aa" font-size="11">React Native + Expo + TypeScript</text>
  <text x="432" y="178" fill="#f97316" font-size="10" font-weight="600">Native: WeatherKit (iOS 16+)</text>
  <text x="432" y="194" fill="#f97316" font-size="10" font-weight="600">Native: Foundation Models (iOS 26+)</text>
  <text x="432" y="210" fill="#8888aa" font-size="10">App Store via EAS Build</text>

  <!-- Android -->
  <rect x="780" y="112" width="360" height="110" rx="10" fill="#1a1a24" stroke="#2a2a38" stroke-width="1"/>
  <circle cx="804" cy="135" r="12" fill="#22c55e" opacity="0.15" stroke="#22c55e" stroke-width="1"/>
  <text x="804" y="140" text-anchor="middle" fill="#22c55e" font-size="14">🤖</text>
  <text x="822" y="140" fill="#f0f0f5" font-size="14" font-weight="700">Android App</text>
  <text x="792" y="162" fill="#8888aa" font-size="11">React Native + Expo + TypeScript</text>
  <text x="792" y="178" fill="#8888aa" font-size="11">Shared codebase with iOS</text>
  <text x="792" y="198" fill="#8888aa" font-size="10">Play Store via EAS Build</text>

  <!-- Connection arrows: clients → backend -->
  <line x1="225" y1="222" x2="225" y2="280" stroke="#4ade80" stroke-width="1.5" stroke-dasharray="6,4" opacity="0.5"/>
  <line x1="585" y1="222" x2="585" y2="280" stroke="#4ade80" stroke-width="1.5" stroke-dasharray="6,4" opacity="0.5"/>
  <line x1="960" y1="222" x2="960" y2="280" stroke="#4ade80" stroke-width="1.5" stroke-dasharray="6,4" opacity="0.5"/>
  <text x="600" y="264" text-anchor="middle" fill="#4ade80" font-size="10" font-weight="600" opacity="0.8">HTTPS  ·  fetchWithRetry  ·  AbortSignal</text>

  <!-- ═══ BACKEND SECTION ═══ -->
  <rect x="30" y="280" width="1140" height="280" rx="12" fill="#111118" stroke="#2a2a38" stroke-width="1"/>
  <rect x="30" y="280" width="1140" height="4" rx="2" fill="#60a5fa" opacity="0.6"/>
  <text x="56" y="307" fill="#60a5fa" font-size="11" font-weight="700" letter-spacing="1.5">BACKEND — RAILWAY</text>
  <text x="320" y="307" fill="#8888aa" font-size="10">Node.js + Express (ESM)</text>

  <!-- Middleware bar -->
  <rect x="60" y="318" width="1080" height="32" rx="6" fill="#1a1a24" stroke="#2a2a38" stroke-width="1"/>
  <text x="80" y="339" fill="#8888aa" font-size="10" font-weight="600">CORS</text>
  <text x="124" y="339" fill="#2a2a38" font-size="10">│</text>
  <text x="138" y="339" fill="#8888aa" font-size="10" font-weight="600">10kb Limit</text>
  <text x="218" y="339" fill="#2a2a38" font-size="10">│</text>
  <text x="232" y="339" fill="#8888aa" font-size="10" font-weight="600">Security Headers</text>
  <text x="364" y="339" fill="#2a2a38" font-size="10">│</text>
  <text x="378" y="339" fill="#8888aa" font-size="10" font-weight="600">Rate Limiter (30/15m)</text>
  <text x="540" y="339" fill="#2a2a38" font-size="10">│</text>
  <text x="554" y="339" fill="#8888aa" font-size="10" font-weight="600">Input Sanitization (XSS + Prompt Injection)</text>

  <!-- API Routes -->
  <rect x="60" y="362" width="520" height="182" rx="8" fill="#1a1a24" stroke="#2a2a38" stroke-width="1"/>
  <text x="80" y="383" fill="#4ade80" font-size="11" font-weight="700">API ROUTES</text>

  <text x="80" y="404" fill="#f0f0f5" font-size="10" font-weight="600">Trip Planning</text>
  <text x="80" y="420" fill="#8888aa" font-size="10">POST  /api/v1/trip/bundle</text>
  <rect x="272" y="410" width="44" height="14" rx="3" fill="#f97316" opacity="0.2"/>
  <text x="294" y="420" text-anchor="middle" fill="#f97316" font-size="8" font-weight="700">PRIMARY</text>
  <text x="80" y="436" fill="#8888aa" font-size="10">POST  /api/v1/trip/plan  ·  /replan  ·  /packing</text>
  <text x="80" y="452" fill="#8888aa" font-size="10">POST  /api/v1/trip/resolve</text>

  <text x="80" y="475" fill="#f0f0f5" font-size="10" font-weight="600">Safety</text>
  <text x="80" y="491" fill="#8888aa" font-size="10">POST  /api/v1/safety/car-seat-check</text>
  <text x="80" y="507" fill="#8888aa" font-size="10">GET   /api/v1/safety/travel-advisory/:code</text>
  <text x="80" y="523" fill="#8888aa" font-size="10">GET   /api/v1/safety/neighborhood?lat&amp;lon</text>

  <!-- Service Layer -->
  <rect x="600" y="362" width="540" height="182" rx="8" fill="#1a1a24" stroke="#2a2a38" stroke-width="1"/>
  <text x="620" y="383" fill="#f97316" font-size="11" font-weight="700">SERVICE LAYER</text>

  <rect x="620" y="394" width="134" height="26" rx="5" fill="#4ade80" opacity="0.08" stroke="#4ade80" stroke-width="0.5"/>
  <text x="687" y="411" text-anchor="middle" fill="#4ade80" font-size="10" font-weight="600">geocoding.js</text>

  <rect x="764" y="394" width="110" height="26" rx="5" fill="#60a5fa" opacity="0.08" stroke="#60a5fa" stroke-width="0.5"/>
  <text x="819" y="411" text-anchor="middle" fill="#60a5fa" font-size="10" font-weight="600">weather.js</text>

  <rect x="884" y="394" width="134" height="26" rx="5" fill="#60a5fa" opacity="0.08" stroke="#60a5fa" stroke-width="0.5"/>
  <text x="951" y="411" text-anchor="middle" fill="#60a5fa" font-size="10" font-weight="600">openWeatherMap.js</text>

  <rect x="620" y="430" width="134" height="26" rx="5" fill="#f97316" opacity="0.08" stroke="#f97316" stroke-width="0.5"/>
  <text x="687" y="447" text-anchor="middle" fill="#f97316" font-size="10" font-weight="600">tripPlanAI.js</text>

  <rect x="764" y="430" width="134" height="26" rx="5" fill="#f97316" opacity="0.08" stroke="#f97316" stroke-width="0.5"/>
  <text x="831" y="447" text-anchor="middle" fill="#f97316" font-size="10" font-weight="600">packingListAI.js</text>

  <rect x="908" y="430" width="112" height="26" rx="5" fill="#f97316" opacity="0.08" stroke="#f97316" stroke-width="0.5"/>
  <text x="964" y="447" text-anchor="middle" fill="#f97316" font-size="10" font-weight="600">aiClient.js</text>

  <rect x="620" y="466" width="134" height="26" rx="5" fill="#22c55e" opacity="0.08" stroke="#22c55e" stroke-width="0.5"/>
  <text x="687" y="483" text-anchor="middle" fill="#22c55e" font-size="10" font-weight="600">safetyRules.js</text>

  <rect x="764" y="466" width="154" height="26" rx="5" fill="#22c55e" opacity="0.08" stroke="#22c55e" stroke-width="0.5"/>
  <text x="841" y="483" text-anchor="middle" fill="#22c55e" font-size="10" font-weight="600">travelAdvisory.js</text>

  <rect x="620" y="502" width="180" height="26" rx="5" fill="#22c55e" opacity="0.08" stroke="#22c55e" stroke-width="0.5"/>
  <text x="710" y="519" text-anchor="middle" fill="#22c55e" font-size="10" font-weight="600">neighborhoodSafety.js</text>

  <rect x="810" y="502" width="170" height="26" rx="5" fill="#22c55e" opacity="0.08" stroke="#22c55e" stroke-width="0.5"/>
  <text x="895" y="519" text-anchor="middle" fill="#22c55e" font-size="10" font-weight="600">safetyLawResearch.js</text>

  <!-- Connection arrows: backend → external -->
  <line x1="600" y1="560" x2="600" y2="600" stroke="#f97316" stroke-width="1.5" stroke-dasharray="6,4" opacity="0.5"/>

  <!-- ═══ EXTERNAL SERVICES ═══ -->
  <rect x="30" y="600" width="1140" height="200" rx="12" fill="#111118" stroke="#2a2a38" stroke-width="1"/>
  <rect x="30" y="600" width="1140" height="4" rx="2" fill="#f97316" opacity="0.6"/>
  <text x="56" y="627" fill="#f97316" font-size="11" font-weight="700" letter-spacing="1.5">EXTERNAL SERVICES</text>

  <!-- AI -->
  <rect x="60" y="640" width="200" height="68" rx="8" fill="#1a1a24" stroke="#f97316" stroke-width="1" opacity="0.8"/>
  <text x="80" y="661" fill="#f97316" font-size="12" font-weight="700">Anthropic Claude</text>
  <text x="80" y="678" fill="#8888aa" font-size="10">claude-haiku-4-5-20251001</text>
  <text x="80" y="694" fill="#8888aa" font-size="10">Trip plans, packing, safety</text>

  <!-- Weather.gov -->
  <rect x="280" y="640" width="170" height="68" rx="8" fill="#1a1a24" stroke="#60a5fa" stroke-width="1" opacity="0.8"/>
  <text x="300" y="661" fill="#60a5fa" font-size="12" font-weight="700">Weather.gov</text>
  <text x="300" y="678" fill="#8888aa" font-size="10">NWS — US only</text>
  <text x="300" y="694" fill="#8888aa" font-size="10">Free, no auth</text>

  <!-- OpenWeatherMap -->
  <rect x="470" y="640" width="170" height="68" rx="8" fill="#1a1a24" stroke="#60a5fa" stroke-width="1" opacity="0.8"/>
  <text x="490" y="661" fill="#60a5fa" font-size="12" font-weight="700">OpenWeatherMap</text>
  <text x="490" y="678" fill="#8888aa" font-size="10">International weather</text>
  <text x="490" y="694" fill="#8888aa" font-size="10">API key required</text>

  <!-- Nominatim -->
  <rect x="660" y="640" width="170" height="68" rx="8" fill="#1a1a24" stroke="#4ade80" stroke-width="1" opacity="0.8"/>
  <text x="680" y="661" fill="#4ade80" font-size="12" font-weight="700">Nominatim (OSM)</text>
  <text x="680" y="678" fill="#8888aa" font-size="10">Geocoding</text>
  <text x="680" y="694" fill="#8888aa" font-size="10">Free, no auth</text>

  <!-- Amadeus -->
  <rect x="60" y="720" width="200" height="68" rx="8" fill="#1a1a24" stroke="#22c55e" stroke-width="1" opacity="0.8"/>
  <text x="80" y="741" fill="#22c55e" font-size="12" font-weight="700">Amadeus / GeoSure</text>
  <text x="80" y="758" fill="#8888aa" font-size="10">Neighborhood safety scores</text>
  <text x="80" y="774" fill="#8888aa" font-size="10">OAuth2, scores 1-100</text>

  <!-- State Dept -->
  <rect x="280" y="720" width="170" height="68" rx="8" fill="#1a1a24" stroke="#22c55e" stroke-width="1" opacity="0.8"/>
  <text x="300" y="741" fill="#22c55e" font-size="12" font-weight="700">US State Dept</text>
  <text x="300" y="758" fill="#8888aa" font-size="10">Travel advisories L1-4</text>
  <text x="300" y="774" fill="#8888aa" font-size="10">Free, no auth</text>

  <!-- Overpass -->
  <rect x="470" y="720" width="170" height="68" rx="8" fill="#1a1a24" stroke="#4ade80" stroke-width="1" opacity="0.8"/>
  <text x="490" y="741" fill="#4ade80" font-size="12" font-weight="700">Overpass API</text>
  <text x="490" y="758" fill="#8888aa" font-size="10">Nearby city queries</text>
  <text x="490" y="774" fill="#8888aa" font-size="10">Free, no auth</text>

  <!-- DeepSeek -->
  <rect x="660" y="720" width="170" height="68" rx="8" fill="#1a1a24" stroke="#8888aa" stroke-width="1" stroke-dasharray="4,3" opacity="0.6"/>
  <text x="680" y="741" fill="#8888aa" font-size="12" font-weight="700">DeepSeek V3</text>
  <text x="680" y="758" fill="#8888aa" font-size="10">Optional alt AI provider</text>
  <text x="680" y="774" fill="#8888aa" font-size="10">OpenAI-compatible SDK</text>

  <!-- Caching note -->
  <rect x="850" y="640" width="290" height="148" rx="8" fill="#1a1a24" stroke="#2a2a38" stroke-width="1"/>
  <text x="870" y="661" fill="#f0f0f5" font-size="11" font-weight="700">In-Memory Caches</text>
  <text x="870" y="682" fill="#8888aa" font-size="10">Geocode         6h TTL   500 entries</text>
  <text x="870" y="698" fill="#8888aa" font-size="10">Weather.gov     1h TTL   100 entries</text>
  <text x="870" y="714" fill="#8888aa" font-size="10">OpenWeatherMap  1h TTL   100 entries</text>
  <text x="870" y="730" fill="#8888aa" font-size="10">Neighborhood    12h TTL  500 entries</text>
  <text x="870" y="746" fill="#8888aa" font-size="10">Advisory        24h TTL  full list</text>
  <text x="870" y="762" fill="#8888aa" font-size="10">Amadeus token   29m TTL  1 token</text>
  <text x="870" y="780" fill="#8888aa" font-size="9" font-style="italic">Single Railway instance, LRU eviction</text>

  <!-- Footer -->
  <text x="600" y="810" text-anchor="middle" fill="#8888aa" font-size="9" opacity="0.5">SproutRoute System Architecture  ·  US, Canada, UK, Australia  ·  Built by Nitish Prasad</text>
</svg>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 600" font-family="'Inter', 'Segoe UI', sans-serif">
  <defs>
    <linearGradient id="greenGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#4ade80" stop-opacity="0.15"/>
      <stop offset="100%" stop-color="#22c55e" stop-opacity="0.05"/>
    </linearGradient>
    <linearGradient id="orangeGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#f97316" stop-opacity="0.15"/>
      <stop offset="100%" stop-color="#f97316" stop-opacity="0.05"/>
    </linearGradient>
    <linearGradient id="blueGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#60a5fa" stop-opacity="0.15"/>
      <stop offset="100%" stop-color="#60a5fa" stop-opacity="0.05"/>
    </linearGradient>
    <linearGradient id="grayGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#8888aa" stop-opacity="0.12"/>
      <stop offset="100%" stop-color="#8888aa" stop-opacity="0.04"/>
    </linearGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="2" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <marker id="arrowGreen" viewBox="0 0 10 7" refX="10" refY="3.5" markerWidth="8" markerHeight="6" orient="auto-start-auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#4ade80" opacity="0.7"/>
    </marker>
    <marker id="arrowOrange" viewBox="0 0 10 7" refX="10" refY="3.5" markerWidth="8" markerHeight="6" orient="auto-start-auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#f97316" opacity="0.7"/>
    </marker>
    <marker id="arrowBlue" viewBox="0 0 10 7" refX="10" refY="3.5" markerWidth="8" markerHeight="6" orient="auto-start-auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#60a5fa" opacity="0.7"/>
    </marker>
    <marker id="arrowGray" viewBox="0 0 10 7" refX="10" refY="3.5" markerWidth="8" markerHeight="6" orient="auto-start-auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#8888aa" opacity="0.7"/>
    </marker>
  </defs>

  <!-- Background -->
  <rect width="1200" height="600" fill="#0a0a0f" rx="16"/>
  <rect x="0" y="0" width="1200" height="600" fill="url(#greenGrad)" rx="16" opacity="0.2"/>

  <!-- Title -->
  <text x="600" y="36" text-anchor="middle" fill="#f0f0f5" font-size="20" font-weight="800" letter-spacing="0.5">SproutRoute — End-to-End Runtime Architecture</text>
  <line x1="380" y1="46" x2="820" y2="46" stroke="#4ade80" stroke-width="2" opacity="0.4"/>
  <text x="600" y="66" text-anchor="middle" fill="#8888aa" font-size="11" font-style="italic">AI generates itineraries. Everything else is verified, deterministic, or cached.</text>

  <!-- ═══ ROW 1: User → Client → Backend ═══ -->

  <!-- User -->
  <rect x="30" y="100" width="120" height="80" rx="10" fill="#1a1a24" stroke="#f0f0f5" stroke-width="1" opacity="0.9"/>
  <text x="90" y="133" text-anchor="middle" fill="#f0f0f5" font-size="22">👨‍👩‍👧</text>
  <text x="90" y="157" text-anchor="middle" fill="#f0f0f5" font-size="11" font-weight="700">User</text>
  <text x="90" y="172" text-anchor="middle" fill="#8888aa" font-size="9">Free-text input</text>

  <!-- Arrow: User → Client -->
  <line x1="150" y1="140" x2="185" y2="140" stroke="#4ade80" stroke-width="1.5" marker-end="url(#arrowGreen)" opacity="0.6"/>

  <!-- Client -->
  <rect x="190" y="92" width="160" height="96" rx="10" fill="#1a1a24" stroke="#4ade80" stroke-width="1"/>
  <rect x="190" y="92" width="160" height="3" rx="2" fill="#4ade80" opacity="0.6"/>
  <text x="270" y="118" text-anchor="middle" fill="#4ade80" font-size="12" font-weight="700">React / Expo</text>
  <text x="270" y="136" text-anchor="middle" fill="#8888aa" font-size="10">Web + iOS + Android</text>
  <text x="270" y="152" text-anchor="middle" fill="#8888aa" font-size="9">useTrip orchestrator</text>
  <text x="270" y="167" text-anchor="middle" fill="#8888aa" font-size="9">fetchWithRetry + AbortSignal</text>
  <text x="270" y="181" text-anchor="middle" fill="#4ade80" font-size="8" font-weight="600">3 platforms, 1 codebase</text>

  <!-- Arrow: Client → Backend -->
  <line x1="350" y1="140" x2="395" y2="140" stroke="#4ade80" stroke-width="1.5" marker-end="url(#arrowGreen)" opacity="0.6"/>
  <text x="372" y="133" text-anchor="middle" fill="#4ade80" font-size="8" opacity="0.7">HTTPS</text>

  <!-- Backend (Express) — central hub -->
  <rect x="400" y="86" width="175" height="108" rx="10" fill="#1a1a24" stroke="#60a5fa" stroke-width="1.5"/>
  <rect x="400" y="86" width="175" height="3" rx="2" fill="#60a5fa" opacity="0.6"/>
  <text x="488" y="112" text-anchor="middle" fill="#60a5fa" font-size="12" font-weight="700">Express Backend</text>
  <text x="488" y="130" text-anchor="middle" fill="#8888aa" font-size="10">Node.js + ESM</text>
  <text x="488" y="146" text-anchor="middle" fill="#8888aa" font-size="9">CORS, rate limiter, sanitizer</text>
  <text x="488" y="160" text-anchor="middle" fill="#8888aa" font-size="9">Prompt injection guard</text>
  <text x="488" y="176" text-anchor="middle" fill="#8888aa" font-size="9">/api/v1/trip/bundle endpoint</text>
  <text x="488" y="188" text-anchor="middle" fill="#60a5fa" font-size="8" font-weight="600">7 external API integrations</text>

  <!-- ═══ ROW 2: Fan-out from Backend ═══ -->

  <!-- Arrows from Backend down to services -->
  <!-- To Gemini (AI) -->
  <line x1="430" y1="194" x2="90" y2="270" stroke="#f97316" stroke-width="1.5" stroke-dasharray="6,4" marker-end="url(#arrowOrange)" opacity="0.5"/>
  <!-- To Packing Engine -->
  <line x1="450" y1="194" x2="255" y2="270" stroke="#4ade80" stroke-width="1.5" stroke-dasharray="6,4" marker-end="url(#arrowGreen)" opacity="0.5"/>
  <!-- To Weather APIs -->
  <line x1="470" y1="194" x2="430" y2="270" stroke="#60a5fa" stroke-width="1.5" stroke-dasharray="6,4" marker-end="url(#arrowBlue)" opacity="0.5"/>
  <!-- To Google Places -->
  <line x1="495" y1="194" x2="600" y2="270" stroke="#60a5fa" stroke-width="1.5" stroke-dasharray="6,4" marker-end="url(#arrowBlue)" opacity="0.5"/>
  <!-- To Safety Rules -->
  <line x1="520" y1="194" x2="770" y2="270" stroke="#4ade80" stroke-width="1.5" stroke-dasharray="6,4" marker-end="url(#arrowGreen)" opacity="0.5"/>
  <!-- To Supabase -->
  <line x1="545" y1="194" x2="940" y2="270" stroke="#8888aa" stroke-width="1.5" stroke-dasharray="6,4" marker-end="url(#arrowGray)" opacity="0.5"/>
  <!-- To Railway -->
  <line x1="560" y1="194" x2="1105" y2="270" stroke="#8888aa" stroke-width="1.5" stroke-dasharray="6,4" marker-end="url(#arrowGray)" opacity="0.5"/>

  <!-- ═══ SERVICE NODES ═══ -->

  <!-- Gemini (AI - Orange) -->
  <rect x="20" y="274" width="145" height="96" rx="10" fill="url(#orangeGrad)" stroke="#f97316" stroke-width="1"/>
  <rect x="20" y="274" width="145" height="3" rx="2" fill="#f97316" opacity="0.7"/>
  <text x="93" y="298" text-anchor="middle" fill="#f97316" font-size="12" font-weight="700">Gemini 2.5 Flash</text>
  <text x="93" y="314" text-anchor="middle" fill="#8888aa" font-size="9">Itinerary generation</text>
  <text x="93" y="329" text-anchor="middle" fill="#8888aa" font-size="9">Input parsing (NLP)</text>
  <text x="93" y="344" text-anchor="middle" fill="#8888aa" font-size="9">Safety tips</text>
  <text x="93" y="362" text-anchor="middle" fill="#f97316" font-size="8" font-weight="600">Only AI-generated output</text>

  <!-- Packing Engine (Green - Deterministic) -->
  <rect x="185" y="274" width="145" height="96" rx="10" fill="url(#greenGrad)" stroke="#4ade80" stroke-width="1"/>
  <rect x="185" y="274" width="145" height="3" rx="2" fill="#4ade80" opacity="0.7"/>
  <text x="258" y="298" text-anchor="middle" fill="#4ade80" font-size="12" font-weight="700">Packing Engine</text>
  <text x="258" y="314" text-anchor="middle" fill="#8888aa" font-size="9">Deterministic rules</text>
  <text x="258" y="329" text-anchor="middle" fill="#8888aa" font-size="9">Weather-aware items</text>
  <text x="258" y="344" text-anchor="middle" fill="#8888aa" font-size="9">Kid + pet categories</text>
  <text x="258" y="362" text-anchor="middle" fill="#4ade80" font-size="8" font-weight="600">Zero AI, 100% testable</text>

  <!-- Weather APIs (Blue - Factual) -->
  <rect x="350" y="274" width="155" height="96" rx="10" fill="url(#blueGrad)" stroke="#60a5fa" stroke-width="1"/>
  <rect x="350" y="274" width="155" height="3" rx="2" fill="#60a5fa" opacity="0.7"/>
  <text x="428" y="298" text-anchor="middle" fill="#60a5fa" font-size="12" font-weight="700">Weather APIs</text>
  <text x="428" y="314" text-anchor="middle" fill="#8888aa" font-size="9">Weather.gov (US)</text>
  <text x="428" y="329" text-anchor="middle" fill="#8888aa" font-size="9">OpenWeatherMap (intl)</text>
  <text x="428" y="344" text-anchor="middle" fill="#8888aa" font-size="9">1h TTL cache</text>
  <text x="428" y="362" text-anchor="middle" fill="#60a5fa" font-size="8" font-weight="600">Real-time forecasts</text>

  <!-- Google Places (Blue - Factual) -->
  <rect x="525" y="274" width="155" height="96" rx="10" fill="url(#blueGrad)" stroke="#60a5fa" stroke-width="1"/>
  <rect x="525" y="274" width="155" height="3" rx="2" fill="#60a5fa" opacity="0.7"/>
  <text x="603" y="298" text-anchor="middle" fill="#60a5fa" font-size="12" font-weight="700">Google Places</text>
  <text x="603" y="314" text-anchor="middle" fill="#8888aa" font-size="9">Photo enrichment</text>
  <text x="603" y="329" text-anchor="middle" fill="#8888aa" font-size="9">Ratings + hours</text>
  <text x="603" y="344" text-anchor="middle" fill="#8888aa" font-size="9">Geocode fallback</text>
  <text x="603" y="362" text-anchor="middle" fill="#60a5fa" font-size="8" font-weight="600">Verified place data</text>

  <!-- Safety Rules (Green - Deterministic) -->
  <rect x="700" y="274" width="155" height="96" rx="10" fill="url(#greenGrad)" stroke="#4ade80" stroke-width="1"/>
  <rect x="700" y="274" width="155" height="3" rx="2" fill="#4ade80" opacity="0.7"/>
  <text x="778" y="298" text-anchor="middle" fill="#4ade80" font-size="12" font-weight="700">Safety Rules</text>
  <text x="778" y="314" text-anchor="middle" fill="#8888aa" font-size="9">Car seat laws (50 states)</text>
  <text x="778" y="329" text-anchor="middle" fill="#8888aa" font-size="9">Pet airline policies</text>
  <text x="778" y="344" text-anchor="middle" fill="#8888aa" font-size="9">Travel advisories</text>
  <text x="778" y="362" text-anchor="middle" fill="#4ade80" font-size="8" font-weight="600">Static data, DI tested</text>

  <!-- Supabase (Gray - Storage) -->
  <rect x="875" y="274" width="135" height="96" rx="10" fill="url(#grayGrad)" stroke="#8888aa" stroke-width="1"/>
  <rect x="875" y="274" width="135" height="3" rx="2" fill="#8888aa" opacity="0.5"/>
  <text x="943" y="298" text-anchor="middle" fill="#8888aa" font-size="12" font-weight="700">Supabase</text>
  <text x="943" y="314" text-anchor="middle" fill="#6b6b88" font-size="9">Attraction cache</text>
  <text x="943" y="329" text-anchor="middle" fill="#6b6b88" font-size="9">Places enrichment</text>
  <text x="943" y="344" text-anchor="middle" fill="#6b6b88" font-size="9">Precomputed scores</text>
  <text x="943" y="362" text-anchor="middle" fill="#8888aa" font-size="8" font-weight="600">Postgres + Edge Functions</text>

  <!-- Railway (Gray - Infrastructure) -->
  <rect x="1030" y="274" width="145" height="96" rx="10" fill="url(#grayGrad)" stroke="#8888aa" stroke-width="1"/>
  <rect x="1030" y="274" width="145" height="3" rx="2" fill="#8888aa" opacity="0.5"/>
  <text x="1103" y="298" text-anchor="middle" fill="#8888aa" font-size="12" font-weight="700">Railway</text>
  <text x="1103" y="314" text-anchor="middle" fill="#6b6b88" font-size="9">Container hosting</text>
  <text x="1103" y="329" text-anchor="middle" fill="#6b6b88" font-size="9">Auto-deploy on push</text>
  <text x="1103" y="344" text-anchor="middle" fill="#6b6b88" font-size="9">Static file serving</text>
  <text x="1103" y="362" text-anchor="middle" fill="#8888aa" font-size="8" font-weight="600">CI/CD from GitHub</text>

  <!-- ═══ METRIC CALLOUTS ═══ -->
  <rect x="60" y="410" width="145" height="44" rx="8" fill="#1a1a24" stroke="#4ade80" stroke-width="1" opacity="0.8"/>
  <text x="133" y="430" text-anchor="middle" fill="#4ade80" font-size="16" font-weight="800" filter="url(#glow)">342</text>
  <text x="133" y="446" text-anchor="middle" fill="#8888aa" font-size="9" font-weight="600">automated tests</text>

  <rect x="230" y="410" width="175" height="44" rx="8" fill="#1a1a24" stroke="#60a5fa" stroke-width="1" opacity="0.8"/>
  <text x="318" y="430" text-anchor="middle" fill="#60a5fa" font-size="16" font-weight="800" filter="url(#glow)">7</text>
  <text x="318" y="446" text-anchor="middle" fill="#8888aa" font-size="9" font-weight="600">external API integrations</text>

  <rect x="430" y="410" width="195" height="44" rx="8" fill="#1a1a24" stroke="#4ade80" stroke-width="1" opacity="0.8"/>
  <text x="528" y="430" text-anchor="middle" fill="#4ade80" font-size="14" font-weight="800" filter="url(#glow)">deterministic</text>
  <text x="528" y="446" text-anchor="middle" fill="#8888aa" font-size="9" font-weight="600">packing + safety (no AI)</text>

  <!-- ═══ DATA FLOW ANNOTATION ═══ -->
  <rect x="660" y="400" width="510" height="60" rx="8" fill="#1a1a24" stroke="#2a2a38" stroke-width="1"/>
  <text x="680" y="420" fill="#f0f0f5" font-size="10" font-weight="700">Request Flow</text>
  <text x="680" y="436" fill="#8888aa" font-size="9">1. User types free text  2. AI parses intent  3. Backend fans out to 5+ services in parallel</text>
  <text x="680" y="452" fill="#8888aa" font-size="9">4. Itinerary streams first (AI)  5. Packing, safety, weather resolve deterministically  6. Client assembles mosaic</text>

  <!-- ═══ LEGEND ═══ -->
  <rect x="30" y="490" width="1140" height="80" rx="12" fill="#111118" stroke="#2a2a38" stroke-width="1"/>
  <text x="56" y="516" fill="#f0f0f5" font-size="11" font-weight="700" letter-spacing="1">LEGEND</text>

  <!-- Orange: AI -->
  <rect x="120" y="505" width="14" height="14" rx="3" fill="#f97316" opacity="0.3" stroke="#f97316" stroke-width="1"/>
  <text x="140" y="516" fill="#f97316" font-size="10" font-weight="600">AI Generation</text>
  <text x="140" y="530" fill="#8888aa" font-size="9">Gemini itinerary, input parsing</text>

  <!-- Blue: Factual -->
  <rect x="320" y="505" width="14" height="14" rx="3" fill="#60a5fa" opacity="0.3" stroke="#60a5fa" stroke-width="1"/>
  <text x="340" y="516" fill="#60a5fa" font-size="10" font-weight="600">Factual / Verified</text>
  <text x="340" y="530" fill="#8888aa" font-size="9">Weather, Google Places, Travel Advisory</text>

  <!-- Green: Deterministic -->
  <rect x="560" y="505" width="14" height="14" rx="3" fill="#4ade80" opacity="0.3" stroke="#4ade80" stroke-width="1"/>
  <text x="580" y="516" fill="#4ade80" font-size="10" font-weight="600">Deterministic Logic</text>
  <text x="580" y="530" fill="#8888aa" font-size="9">Packing engine, safety rules, DI-tested</text>

  <!-- Gray: Infra -->
  <rect x="800" y="505" width="14" height="14" rx="3" fill="#8888aa" opacity="0.3" stroke="#8888aa" stroke-width="1"/>
  <text x="820" y="516" fill="#8888aa" font-size="10" font-weight="600">Storage / Infrastructure</text>
  <text x="820" y="530" fill="#8888aa" font-size="9">Supabase, Railway, caching layer</text>

  <!-- Dashed vs solid note -->
  <line x1="120" y1="550" x2="160" y2="550" stroke="#8888aa" stroke-width="1.5" stroke-dasharray="6,4" opacity="0.6"/>
  <text x="168" y="554" fill="#8888aa" font-size="9">Async / fan-out call</text>
  <line x1="320" y1="550" x2="360" y2="550" stroke="#8888aa" stroke-width="1.5" opacity="0.6"/>
  <text x="368" y="554" fill="#8888aa" font-size="9">Synchronous call</text>

  <!-- Footer -->
  <text x="600" y="590" text-anchor="middle" fill="#8888aa" font-size="9" opacity="0.5">SproutRoute Runtime Architecture  ·  AI for creativity, deterministic for trust  ·  Built by Nitish Prasad</text>
</svg>
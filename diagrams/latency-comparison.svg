<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 700" font-family="'Inter', 'Segoe UI', sans-serif">
  <defs>
    <linearGradient id="redGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#f97316" stop-opacity="0.12"/>
      <stop offset="100%" stop-color="#ef4444" stop-opacity="0.04"/>
    </linearGradient>
    <linearGradient id="greenGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#4ade80" stop-opacity="0.12"/>
      <stop offset="100%" stop-color="#22c55e" stop-opacity="0.04"/>
    </linearGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="2" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>

  <!-- Background -->
  <rect width="1200" height="700" fill="#0a0a0f" rx="16"/>

  <!-- Title -->
  <text x="600" y="38" text-anchor="middle" fill="#f0f0f5" font-size="20" font-weight="800" letter-spacing="0.5">Latency: Before vs After</text>
  <line x1="460" y1="48" x2="740" y2="48" stroke="#8888aa" stroke-width="1" opacity="0.4"/>

  <!-- ══════ BEFORE PANEL (left) ══════ -->
  <rect x="30" y="65" width="555" height="490" rx="12" fill="#111118" stroke="#2a2a38" stroke-width="1"/>
  <rect x="30" y="65" width="555" height="4" rx="2" fill="#f97316" opacity="0.7"/>
  <rect x="30" y="65" width="555" height="490" rx="12" fill="url(#redGrad)"/>

  <text x="56" y="94" fill="#f97316" font-size="12" font-weight="700" letter-spacing="2">BEFORE</text>
  <text x="530" y="94" text-anchor="end" fill="#f97316" font-size="14" font-weight="700" opacity="0.8">~8-12s</text>

  <!-- Before Step 1 -->
  <rect x="60" y="112" width="495" height="72" rx="10" fill="#1a1a24" stroke="#f9731640" stroke-width="1"/>
  <circle cx="88" cy="135" r="14" fill="#f97316" opacity="0.15" stroke="#f97316" stroke-width="1"/>
  <text x="88" y="140" text-anchor="middle" fill="#f97316" font-size="13" font-weight="700">1</text>
  <text x="112" y="136" fill="#f0f0f5" font-size="13" font-weight="600">AI Packing in Hot Path</text>
  <text x="112" y="155" fill="#8888aa" font-size="11">Claude generates every packing item on each request</text>
  <rect x="430" y="122" width="110" height="22" rx="6" fill="#f9731620" stroke="#f97316" stroke-width="0.5"/>
  <text x="485" y="137" text-anchor="middle" fill="#f97316" font-size="10" font-weight="600">~2s added</text>

  <!-- Arrow 1 -->
  <line x1="307" y1="184" x2="307" y2="202" stroke="#f97316" stroke-width="1.5" opacity="0.4"/>
  <polygon points="301,198 307,208 313,198" fill="#f97316" opacity="0.4"/>

  <!-- Before Step 2 -->
  <rect x="60" y="212" width="495" height="72" rx="10" fill="#1a1a24" stroke="#f9731640" stroke-width="1"/>
  <circle cx="88" cy="235" r="14" fill="#f97316" opacity="0.15" stroke="#f97316" stroke-width="1"/>
  <text x="88" y="240" text-anchor="middle" fill="#f97316" font-size="13" font-weight="700">2</text>
  <text x="112" y="236" fill="#f0f0f5" font-size="13" font-weight="600">Large Open-Ended AI Output</text>
  <text x="112" y="255" fill="#8888aa" font-size="11">AI searches for places each time; no caching or shortlist</text>
  <rect x="430" y="222" width="110" height="22" rx="6" fill="#f9731620" stroke="#f97316" stroke-width="0.5"/>
  <text x="485" y="237" text-anchor="middle" fill="#f97316" font-size="10" font-weight="600">~1-2s added</text>

  <!-- Arrow 2 -->
  <line x1="307" y1="284" x2="307" y2="302" stroke="#f97316" stroke-width="1.5" opacity="0.4"/>
  <polygon points="301,298 307,308 313,298" fill="#f97316" opacity="0.4"/>

  <!-- Before Step 3 -->
  <rect x="60" y="312" width="495" height="72" rx="10" fill="#1a1a24" stroke="#f9731640" stroke-width="1"/>
  <circle cx="88" cy="335" r="14" fill="#f97316" opacity="0.15" stroke="#f97316" stroke-width="1"/>
  <text x="88" y="340" text-anchor="middle" fill="#f97316" font-size="13" font-weight="700">3</text>
  <text x="112" y="336" fill="#f0f0f5" font-size="13" font-weight="600">One Large Model for Everything</text>
  <text x="112" y="355" fill="#8888aa" font-size="11">Single model handles parsing, itinerary, packing, safety</text>
  <rect x="430" y="322" width="110" height="22" rx="6" fill="#f9731620" stroke="#f97316" stroke-width="0.5"/>
  <text x="485" y="337" text-anchor="middle" fill="#f97316" font-size="10" font-weight="600">high cost</text>

  <!-- Arrow 3 -->
  <line x1="307" y1="384" x2="307" y2="402" stroke="#f97316" stroke-width="1.5" opacity="0.4"/>
  <polygon points="301,398 307,408 313,398" fill="#f97316" opacity="0.4"/>

  <!-- Before Step 4 -->
  <rect x="60" y="412" width="495" height="72" rx="10" fill="#1a1a24" stroke="#f9731640" stroke-width="1"/>
  <circle cx="88" cy="435" r="14" fill="#f97316" opacity="0.15" stroke="#f97316" stroke-width="1"/>
  <text x="88" y="440" text-anchor="middle" fill="#f97316" font-size="13" font-weight="700">4</text>
  <text x="112" y="436" fill="#f0f0f5" font-size="13" font-weight="600">Full Response Wait</text>
  <text x="112" y="455" fill="#8888aa" font-size="11">User sees blank screen until entire response completes</text>
  <rect x="430" y="422" width="110" height="22" rx="6" fill="#f9731620" stroke="#f97316" stroke-width="0.5"/>
  <text x="485" y="437" text-anchor="middle" fill="#f97316" font-size="10" font-weight="600">poor UX</text>

  <!-- ══════ AFTER PANEL (right) ══════ -->
  <rect x="615" y="65" width="555" height="490" rx="12" fill="#111118" stroke="#2a2a38" stroke-width="1"/>
  <rect x="615" y="65" width="555" height="4" rx="2" fill="#4ade80" opacity="0.7"/>
  <rect x="615" y="65" width="555" height="490" rx="12" fill="url(#greenGrad)"/>

  <text x="641" y="94" fill="#4ade80" font-size="12" font-weight="700" letter-spacing="2">AFTER</text>
  <text x="1115" y="94" text-anchor="end" fill="#4ade80" font-size="14" font-weight="700" opacity="0.8">~3-5s</text>

  <!-- After Step 1 -->
  <rect x="645" y="112" width="495" height="72" rx="10" fill="#1a1a24" stroke="#4ade8040" stroke-width="1"/>
  <circle cx="673" cy="135" r="14" fill="#4ade80" opacity="0.15" stroke="#4ade80" stroke-width="1"/>
  <text x="673" y="140" text-anchor="middle" fill="#4ade80" font-size="13" font-weight="700">1</text>
  <text x="697" y="136" fill="#f0f0f5" font-size="13" font-weight="600">Deterministic Packing</text>
  <text x="697" y="155" fill="#8888aa" font-size="11">Rule-based packing list from templates; no AI needed</text>
  <rect x="1015" y="122" width="110" height="22" rx="6" fill="#4ade8020" stroke="#4ade80" stroke-width="0.5"/>
  <text x="1070" y="137" text-anchor="middle" fill="#4ade80" font-size="10" font-weight="600">-2s saved</text>

  <!-- Arrow 1 -->
  <line x1="892" y1="184" x2="892" y2="202" stroke="#4ade80" stroke-width="1.5" opacity="0.4"/>
  <polygon points="886,198 892,208 898,198" fill="#4ade80" opacity="0.4"/>

  <!-- After Step 2 -->
  <rect x="645" y="212" width="495" height="72" rx="10" fill="#1a1a24" stroke="#4ade8040" stroke-width="1"/>
  <circle cx="673" cy="235" r="14" fill="#4ade80" opacity="0.15" stroke="#4ade80" stroke-width="1"/>
  <text x="673" y="240" text-anchor="middle" fill="#4ade80" font-size="13" font-weight="700">2</text>
  <text x="697" y="236" fill="#f0f0f5" font-size="13" font-weight="600">Cached Attraction Shortlist</text>
  <text x="697" y="255" fill="#8888aa" font-size="11">Pre-scored attractions served from cache; AI picks from list</text>
  <rect x="1015" y="222" width="110" height="22" rx="6" fill="#4ade8020" stroke="#4ade80" stroke-width="0.5"/>
  <text x="1070" y="237" text-anchor="middle" fill="#4ade80" font-size="10" font-weight="600">-1-2s saved</text>

  <!-- Arrow 2 -->
  <line x1="892" y1="284" x2="892" y2="302" stroke="#4ade80" stroke-width="1.5" opacity="0.4"/>
  <polygon points="886,298 892,308 898,298" fill="#4ade80" opacity="0.4"/>

  <!-- After Step 3 -->
  <rect x="645" y="312" width="495" height="72" rx="10" fill="#1a1a24" stroke="#4ade8040" stroke-width="1"/>
  <circle cx="673" cy="335" r="14" fill="#4ade80" opacity="0.15" stroke="#4ade80" stroke-width="1"/>
  <text x="673" y="340" text-anchor="middle" fill="#4ade80" font-size="13" font-weight="700">3</text>
  <text x="697" y="336" fill="#f0f0f5" font-size="13" font-weight="600">Per-Task Model Routing</text>
  <text x="697" y="355" fill="#8888aa" font-size="11">Fast model for parsing; capable model for itinerary only</text>
  <rect x="1015" y="322" width="110" height="22" rx="6" fill="#4ade8020" stroke="#4ade80" stroke-width="0.5"/>
  <text x="1070" y="337" text-anchor="middle" fill="#4ade80" font-size="10" font-weight="600">lower cost</text>

  <!-- Arrow 3 -->
  <line x1="892" y1="384" x2="892" y2="402" stroke="#4ade80" stroke-width="1.5" opacity="0.4"/>
  <polygon points="886,398 892,408 898,398" fill="#4ade80" opacity="0.4"/>

  <!-- After Step 4 -->
  <rect x="645" y="412" width="495" height="72" rx="10" fill="#1a1a24" stroke="#4ade8040" stroke-width="1"/>
  <circle cx="673" cy="435" r="14" fill="#4ade80" opacity="0.15" stroke="#4ade80" stroke-width="1"/>
  <text x="673" y="440" text-anchor="middle" fill="#4ade80" font-size="13" font-weight="700">4</text>
  <text x="697" y="436" fill="#f0f0f5" font-size="13" font-weight="600">Progressive Rendering</text>
  <text x="697" y="455" fill="#8888aa" font-size="11">Stream results as they arrive; tiles render independently</text>
  <rect x="1015" y="422" width="110" height="22" rx="6" fill="#4ade8020" stroke="#4ade80" stroke-width="0.5"/>
  <text x="1070" y="437" text-anchor="middle" fill="#4ade80" font-size="10" font-weight="600">instant feel</text>

  <!-- ══════ IMPROVEMENT ARROWS (center connector) ══════ -->
  <line x1="570" y1="148" x2="630" y2="148" stroke="#8888aa" stroke-width="1" stroke-dasharray="4,3" opacity="0.5"/>
  <polygon points="626,144 636,148 626,152" fill="#8888aa" opacity="0.5"/>

  <line x1="570" y1="248" x2="630" y2="248" stroke="#8888aa" stroke-width="1" stroke-dasharray="4,3" opacity="0.5"/>
  <polygon points="626,244 636,248 626,252" fill="#8888aa" opacity="0.5"/>

  <line x1="570" y1="348" x2="630" y2="348" stroke="#8888aa" stroke-width="1" stroke-dasharray="4,3" opacity="0.5"/>
  <polygon points="626,344 636,348 626,352" fill="#8888aa" opacity="0.5"/>

  <line x1="570" y1="448" x2="630" y2="448" stroke="#8888aa" stroke-width="1" stroke-dasharray="4,3" opacity="0.5"/>
  <polygon points="626,444 636,448 626,452" fill="#8888aa" opacity="0.5"/>

  <!-- ══════ BOTTOM: Improvement Summary ══════ -->
  <rect x="30" y="575" width="1140" height="100" rx="12" fill="#111118" stroke="#2a2a38" stroke-width="1"/>

  <!-- Summary boxes -->
  <rect x="50" y="590" width="250" height="36" rx="8" fill="#1a1a24" stroke="#4ade8040" stroke-width="1"/>
  <text x="175" y="613" text-anchor="middle" fill="#4ade80" font-size="11" font-weight="600">AI packing --> Deterministic</text>
  <text x="175" y="625" text-anchor="middle" fill="#8888aa" font-size="9">removed ~2s</text>

  <rect x="320" y="590" width="265" height="36" rx="8" fill="#1a1a24" stroke="#4ade8040" stroke-width="1"/>
  <text x="452" y="613" text-anchor="middle" fill="#4ade80" font-size="11" font-weight="600">Open-ended places --> Cached shortlist</text>
  <text x="452" y="625" text-anchor="middle" fill="#8888aa" font-size="9">removed ~1-2s</text>

  <rect x="605" y="590" width="265" height="36" rx="8" fill="#1a1a24" stroke="#4ade8040" stroke-width="1"/>
  <text x="737" y="613" text-anchor="middle" fill="#4ade80" font-size="11" font-weight="600">One large model --> Per-task routing</text>
  <text x="737" y="625" text-anchor="middle" fill="#8888aa" font-size="9">reduced cost + latency</text>

  <rect x="890" y="590" width="260" height="36" rx="8" fill="#1a1a24" stroke="#4ade8040" stroke-width="1"/>
  <text x="1020" y="613" text-anchor="middle" fill="#4ade80" font-size="11" font-weight="600">Full wait --> Progressive rendering</text>
  <text x="1020" y="625" text-anchor="middle" fill="#8888aa" font-size="9">perceived instant response</text>

  <!-- Takeaway -->
  <text x="600" y="658" text-anchor="middle" fill="#8888aa" font-size="12" font-style="italic">Moving packing and places out of AI cut response time and improved reliability.</text>

</svg>
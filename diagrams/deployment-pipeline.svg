  <text x="92" y="332" fill="#f0f0f5" font-size="14" font-weight="700">Local Dev</text>
  <text x="92" y="352" fill="#8888aa" font-size="10">sproutroute-mobile/</text>
  <text x="92" y="368" fill="#8888aa" font-size="10">React Native + Expo + TS</text>
  <text x="92" y="384" fill="#f97316" font-size="10" font-weight="600">eas build --profile production</text>

  <!-- Arrow -->
  <line x1="290" y1="349" x2="340" y2="349" stroke="#f97316" stroke-width="2" marker-end="url(#aO)"/>


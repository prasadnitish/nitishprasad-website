<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 680" font-family="'Inter', 'Segoe UI', sans-serif">
  <defs>
    <linearGradient id="greenGrad3" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#4ade80" stop-opacity="0.10"/>
      <stop offset="100%" stop-color="#22c55e" stop-opacity="0.03"/>
    </linearGradient>
    <marker id="aG" markerWidth="8" markerHeight="6" refX="8" refY="3" orient="auto">
      <polygon points="0 0, 8 3, 0 6" fill="#4ade80" opacity="0.7"/>
    </marker>
    <marker id="aO" markerWidth="8" markerHeight="6" refX="8" refY="3" orient="auto">
      <polygon points="0 0, 8 3, 0 6" fill="#f97316" opacity="0.7"/>
    </marker>
    <marker id="aB" markerWidth="8" markerHeight="6" refX="8" refY="3" orient="auto">
      <polygon points="0 0, 8 3, 0 6" fill="#60a5fa" opacity="0.7"/>
    </marker>
    <marker id="aW" markerWidth="8" markerHeight="6" refX="8" refY="3" orient="auto">
      <polygon points="0 0, 8 3, 0 6" fill="#f0f0f5" opacity="0.5"/>
    </marker>
  </defs>

  <!-- Background -->
  <rect width="1200" height="680" fill="#0a0a0f" rx="16"/>
  <rect x="0" y="0" width="1200" height="680" fill="url(#greenGrad3)" rx="16" opacity="0.3"/>

  <!-- Title -->
  <text x="600" y="42" text-anchor="middle" fill="#f0f0f5" font-size="20" font-weight="800" letter-spacing="0.5">Deployment Pipeline</text>
  <line x1="470" y1="52" x2="730" y2="52" stroke="#4ade80" stroke-width="2" opacity="0.4"/>

  <!-- ═══ PIPELINE 1: BACKEND + WEB ═══ -->
  <rect x="40" y="72" width="1120" height="170" rx="12" fill="#111118" stroke="#2a2a38" stroke-width="1"/>
  <rect x="40" y="72" width="1120" height="4" rx="2" fill="#4ade80" opacity="0.6"/>
  <text x="66" y="100" fill="#4ade80" font-size="13" font-weight="700" letter-spacing="1">BACKEND + WEB</text>

  <!-- GitHub -->
  <rect x="70" y="116" width="220" height="108" rx="10" fill="#1a1a24" stroke="#f0f0f5" stroke-width="0.5"/>
  <text x="92" y="142" fill="#f0f0f5" font-size="14" font-weight="700">GitHub</text>
  <text x="92" y="162" fill="#8888aa" font-size="10">prasadnitish/SproutRoute</text>
  <text x="92" y="182" fill="#8888aa" font-size="10">Push to main triggers:</text>
  <text x="92" y="198" fill="#4ade80" font-size="10">• GitHub Actions CI</text>
  <text x="92" y="214" fill="#4ade80" font-size="10">• Railway auto-deploy</text>

  <!-- Arrow -->
  <line x1="290" y1="170" x2="340" y2="170" stroke="#4ade80" stroke-width="2" marker-end="url(#aG)"/>

  <!-- GitHub Actions -->
  <rect x="350" y="116" width="220" height="108" rx="10" fill="#1a1a24" stroke="#4ade80" stroke-width="0.5"/>
  <text x="372" y="142" fill="#4ade80" font-size="14" font-weight="700">GitHub Actions</text>
  <text x="372" y="162" fill="#8888aa" font-size="10">CI Pipeline (test.yml)</text>
  <rect x="372" y="172" width="170" height="20" rx="4" fill="#4ade80" opacity="0.08"/>
  <text x="382" y="186" fill="#4ade80" font-size="10">npm test (108 tests)</text>
  <rect x="372" y="196" width="170" height="20" rx="4" fill="#60a5fa" opacity="0.08"/>
  <text x="382" y="210" fill="#60a5fa" font-size="10">vite build (frontend)</text>

  <!-- Arrow -->
  <line x1="570" y1="170" x2="630" y2="170" stroke="#4ade80" stroke-width="2" marker-end="url(#aG)"/>
  <text x="588" y="162" fill="#4ade80" font-size="9" font-weight="600">pass</text>

  <!-- Railway -->
  <rect x="640" y="116" width="490" height="108" rx="10" fill="#1a1a24" stroke="#4ade80" stroke-width="1"/>
  <rect x="640" y="116" width="490" height="4" rx="2" fill="#4ade80" opacity="0.5"/>
  <text x="662" y="142" fill="#4ade80" font-size="14" font-weight="700">Railway</text>
  <text x="755" y="142" fill="#8888aa" font-size="10">Auto-deploy on main</text>

  <text x="662" y="164" fill="#f0f0f5" font-size="10" font-weight="600">Build:</text>
  <text x="708" y="164" fill="#8888aa" font-size="10">npm run build → Vite → dist/</text>

  <text x="662" y="182" fill="#f0f0f5" font-size="10" font-weight="600">Start:</text>
  <text x="708" y="182" fill="#8888aa" font-size="10">node src/backend/server.js</text>

  <text x="662" y="200" fill="#f0f0f5" font-size="10" font-weight="600">Serves:</text>
  <text x="708" y="200" fill="#8888aa" font-size="10">/api/* routes + static frontend</text>

  <rect x="930" y="148" width="185" height="26" rx="5" fill="#4ade80" opacity="0.1" stroke="#4ade80" stroke-width="0.5"/>
  <text x="940" y="166" fill="#4ade80" font-size="10" font-weight="700">sproutroute-production.up.railway.app</text>

  <text x="662" y="218" fill="#8888aa" font-size="9">NODE_ENV=production · PORT=$PORT · ANTHROPIC_API_KEY · OPENWEATHERMAP_API_KEY</text>


  <rect x="410" y="548" width="420" height="44" rx="10" fill="#1a1a24" stroke="#60a5fa" stroke-width="1"/>
  <rect x="410" y="548" width="420" height="3" rx="1.5" fill="#60a5fa" opacity="0.5"/>

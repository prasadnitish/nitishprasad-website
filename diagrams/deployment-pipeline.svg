  <text x="372" y="370" fill="#8888aa" font-size="10">Cloud-based build farm</text>

  <rect x="372" y="384" width="175" height="22" rx="4" fill="#f97316" opacity="0.08"/>
  <text x="382" y="399" fill="#f97316" font-size="10" font-weight="600">iOS → .ipa (Xcode cloud)</text>

  <rect x="372" y="412" width="175" height="22" rx="4" fill="#22c55e" opacity="0.08"/>
  <text x="382" y="427" fill="#22c55e" font-size="10" font-weight="600">Android → .aab (Gradle)</text>

  <text x="372" y="454" fill="#8888aa" font-size="9">autoIncrement: true</text>

  <!-- iOS Arrow -->
  <line x1="570" y1="330" x2="640" y2="330" stroke="#f97316" stroke-width="2" marker-end="url(#aO)"/>
  <text x="590" y="322" fill="#f97316" font-size="9" font-weight="600">.ipa</text>

  <!-- Android Arrow -->
  <line x1="570" y1="400" x2="640" y2="400" stroke="#22c55e" stroke-width="2" marker-end="url(#aG)"/>
  <text x="590" y="392" fill="#22c55e" font-size="9" font-weight="600">.aab</text>

  <!-- App Store Connect -->
  <rect x="650" y="300" width="500" height="80" rx="10" fill="#1a1a24" stroke="#f97316" stroke-width="1"/>
  <rect x="650" y="300" width="500" height="3" rx="1.5" fill="#f97316" opacity="0.5"/>
  <text x="672" y="324" fill="#f97316" font-size="14" font-weight="700">App Store Connect</text>
  <text x="672" y="344" fill="#8888aa" font-size="10">Bundle: com.sproutroute.app</text>
  <text x="672" y="360" fill="#8888aa" font-size="10">Team: YNCCXQ5TUR (Nitish Prasad)</text>
  <text x="672" y="376" fill="#8888aa" font-size="10">Distribution Cert + Provisioning Profile via EAS</text>

  <rect x="980" y="310" width="140" height="22" rx="4" fill="#f97316" opacity="0.12"/>
  <text x="990" y="325" fill="#f97316" font-size="10" font-weight="700">TestFlight → App Store</text>

  <!-- Google Play Console -->
  <rect x="650" y="392" width="500" height="80" rx="10" fill="#1a1a24" stroke="#22c55e" stroke-width="1"/>
  <rect x="650" y="392" width="500" height="3" rx="1.5" fill="#22c55e" opacity="0.5"/>
  <text x="672" y="416" fill="#22c55e" font-size="14" font-weight="700">Google Play Console</text>
  <text x="672" y="436" fill="#8888aa" font-size="10">Package: com.sproutroute.app</text>
  <text x="672" y="452" fill="#8888aa" font-size="10">Signed with EAS-managed Keystore</text>
  <text x="672" y="468" fill="#8888aa" font-size="10">Service account JSON for automated upload</text>

  <rect x="980" y="402" width="140" height="22" rx="4" fill="#22c55e" opacity="0.12"/>
  <text x="990" y="417" fill="#22c55e" font-size="10" font-weight="700">Internal → Production</text>


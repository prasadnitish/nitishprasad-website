  <rect x="230" y="634" width="80" height="24" rx="4" fill="#4ade80" opacity="0.1" stroke="#4ade80" stroke-width="0.5"/>
  <text x="270" y="650" text-anchor="middle" fill="#4ade80" font-size="10" font-weight="700">Canada</text>

  <rect x="320" y="634" width="50" height="24" rx="4" fill="#4ade80" opacity="0.1" stroke="#4ade80" stroke-width="0.5"/>
  <text x="345" y="650" text-anchor="middle" fill="#4ade80" font-size="10" font-weight="700">UK</text>

  <rect x="380" y="634" width="80" height="24" rx="4" fill="#4ade80" opacity="0.1" stroke="#4ade80" stroke-width="0.5"/>
  <text x="420" y="650" text-anchor="middle" fill="#4ade80" font-size="10" font-weight="700">Australia</text>

  <text x="490" y="650" fill="#2a2a38" font-size="11">│</text>

  <text x="510" y="650" fill="#8888aa" font-size="10">Weather.gov (US) · OpenWeatherMap (intl) · WeatherKit (iOS native)</text>

  <text x="930" y="650" fill="#2a2a38" font-size="11">│</text>

  <text x="950" y="650" fill="#8888aa" font-size="10">108 backend tests</text>

  <!-- Footer -->
  <text x="600" y="675" text-anchor="middle" fill="#8888aa" font-size="9" opacity="0.5">SproutRoute Deployment Pipeline  ·  Built by Nitish Prasad</text>

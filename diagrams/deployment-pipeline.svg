  <rect x="40" y="507" width="1120" height="100" rx="12" fill="#111118" stroke="#2a2a38" stroke-width="1"/>
  <rect x="40" y="507" width="1120" height="4" rx="2" fill="#60a5fa" opacity="0.6"/>
  <text x="66" y="535" fill="#60a5fa" font-size="13" font-weight="700" letter-spacing="1">PORTFOLIO WEBSITE</text>

